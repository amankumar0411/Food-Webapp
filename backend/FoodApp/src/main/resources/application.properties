#Database - Aiven MySQL
# Required environment variables (set in .env locally, or in Railway/Render dashboard):
# DB_HOST     = your-service.aivencloud.com
# DB_PORT     = (from Aiven overview page)
# DB_NAME     = defaultdb
# DB_USERNAME = avnadmin
# DB_PASSWORD = (from Aiven overview page — NEVER commit this!)

# Option A: SSL without CA cert verification (simpler, current setup)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl-mode=REQUIRED&requireSSL=true&verifyServerCertificate=false

# Option B: SSL with CA cert (production-grade) — uncomment below and comment out Option A
# Place ca.pem downloaded from Aiven into: src/main/resources/ca.pem
# spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl-mode=VERIFY_CA&requireSSL=true&verifyServerCertificate=true&clientCertificateKeyStoreUrl=classpath:truststore.jks&clientCertificateKeyStorePassword=${TRUSTSTORE_PASSWORD}&trustCertificateKeyStoreUrl=classpath:truststore.jks&trustCertificateKeyStorePassword=${TRUSTSTORE_PASSWORD}

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA / Hibernate
# LOW: ddl-auto=update is convenient but DANGEROUS in production — it can silently drop/alter columns.
# Switch to 'validate' or 'none' once the schema is stable.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool Settings — tuned for Aiven MySQL
# Aiven closes idle connections after ~3600s; maxLifetime must be shorter
spring.datasource.hikari.max-lifetime=600000
# Ping idle connections every 60s to keep them alive
spring.datasource.hikari.keepalive-time=60000
# Validate connection before handing it to the app
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5

management.endpoints.web.exposure.include=health,info

# Security — JWT_SECRET MUST be set as an environment variable (min 32 chars, cryptographically random)
# Generate with: openssl rand -base64 32
# Set on Railway/Render: JWT_SECRET=<generated value>
jwt.secret=${JWT_SECRET}

# JWT expiry — 2 hours (7200000 ms). Override via JWT_EXPIRATION_MS env var.
jwt.expiration.ms=${JWT_EXPIRATION_MS:7200000}

# Swagger — disabled in production. Set SWAGGER_ENABLED=true only in local dev.
swagger.enabled=${SWAGGER_ENABLED:false}

# Jackson — serialize dates as ISO-8601 strings, not timestamp arrays
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

#Render Port
server.port=${PORT:8080}